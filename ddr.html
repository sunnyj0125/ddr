<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신나는 동작 인식 게임</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    body { font-family: 'Jua', sans-serif; }

    /* Animations */
    @keyframes floatBubble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes popBubble { 0% { transform: scale(1); opacity:1; } 100% { transform: scale(0); opacity:0; } }
    .float-bubble { animation: floatBubble 3s ease-in-out infinite; }
    .pop-bubble { animation: popBubble 0.4s ease-out forwards; }
    .card-3d { background: white; border-radius: 24px; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
    
    /* Video mirroring for natural movement */
    #webcam-video { transform: scaleX(-1); object-fit: cover; width: 100%; height: 100%; }
    .game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="h-full w-full flex flex-col" style="background: linear-gradient(135deg, #FFF9C4 0%, #E3F2FD 100%);">
    <nav class="fixed top-0 left-0 right-0 z-[100] bg-white/90 backdrop-blur flex items-center justify-center gap-2 p-3 shadow-md">
      <button class="px-4 py-2 rounded-xl bg-orange-100 text-orange-700 font-bold" onclick="switchScreen('bubble')">🫧 거품파티</button>
      <button class="px-4 py-2 rounded-xl bg-green-100 text-green-700 font-bold" onclick="switchScreen('running')">🐿️ 달리기</button>
      <button class="px-4 py-2 rounded-xl bg-gray-100" onclick="switchScreen('teacher')">⚙️ 설정</button>
    </nav>

    <div class="mt-[70px] flex-1 flex flex-col overflow-hidden">
      <div id="screen-bubble" class="flex-1 flex flex-col items-center p-4 gap-4">
        <h1 class="text-2xl text-orange-600">손을 흔들어 거품을 터뜨려요!</h1>
        <div class="relative w-full max-w-2xl aspect-video card-3d overflow-hidden bg-black">
          <video id="webcam-video" autoplay playsinline></video>
          <div id="bubbles-container" class="absolute inset-0 pointer-events-none"></div>
          <div id="hand-indicator" class="absolute w-8 h-8 border-4 border-yellow-400 rounded-full z-50 opacity-50" style="display:none; transform: scaleX(-1);"></div>
        </div>
        <div class="flex gap-10">
          <div class="text-2xl">⭐ <span id="bubble-score">0</span>점</div>
          <div class="text-2xl">⏰ <span id="bubble-timer">30</span>초</div>
        </div>
        <button onclick="startGame()" class="px-10 py-3 bg-yellow-400 rounded-2xl text-xl font-bold shadow-lg">게임 시작!</button>
      </div>

      <div id="screen-running" class="hidden flex-1 flex-col items-center p-4 gap-4">
        <h1 class="text-2xl text-green-700">앉았다 일어나며 달리기!</h1>
        <div class="relative w-full max-w-2xl aspect-video card-3d overflow-hidden bg-black">
          <video id="running-video" class="absolute inset-0 w-full h-full object-cover scale-x-[-1]" autoplay playsinline></video>
          <div id="sit-alert" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-6xl hidden">🧎 앉으세요!</div>
        </div>
        <div class="text-xl font-bold text-blue-600" id="running-status">서 있는 상태</div>
      </div>

      <div id="screen-success" class="hidden flex-1 flex-col items-center justify-center bg-yellow-50">
        <div class="text-8xl mb-4">🏆</div>
        <h1 class="text-4xl text-orange-500 mb-8">대단해요! 미션 완료!</h1>
        <button onclick="switchScreen('bubble')" class="px-8 py-3 bg-white border-4 border-orange-400 rounded-2xl font-bold">다시 하기</button>
      </div>
    </div>
  </div>

<script>
let score = 0;
let timeLeft = 30;
let gameActive = false;
let isSeated = false;
const videoElement = document.getElementById('webcam-video');
const runningVideo = document.getElementById('running-video');

// --- 동작 인식 초기화 (MediaPipe) ---
const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

pose.onResults(onResults);

// 카메라 설정
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await pose.send({image: videoElement});
  },
  width: 640,
  height: 480
});
camera.start();

// --- 결과 처리 로직 ---
function onResults(results) {
  if (!results.poseLandmarks) return;

  // 1. 거품 게임 터치 인식 (양손 손목 좌표)
  const leftWrist = results.poseLandmarks[15];
  const rightWrist = results.poseLandmarks[16];
  const hip = results.poseLandmarks[24]; // 골반 위치로 앉기 감지

  if (gameActive) {
    checkBubblePop(leftWrist);
    checkBubblePop(rightWrist);
  }

  // 2. 앉기 동작 감지 (단순화: 엉덩이 y값이 특정 수준 아래로 내려가면 앉은 것으로 간주)
  if (hip.y > 0.8) { // 0~1 사이 좌표, 아래로 갈수록 값이 큼
    if (!isSeated) {
      isSeated = true;
      document.getElementById('running-status').innerText = "🧎 앉음!";
      handleSitSuccess();
    }
  } else {
    isSeated = false;
    document.getElementById('running-status').innerText = "🧍 서 있음";
  }
}

// --- 게임 기능 ---
function checkBubblePop(landmark) {
  const container = document.getElementById('bubbles-container');
  const rect = container.getBoundingClientRect();
  
  // 미러링된 영상이므로 x좌표 반전 처리 (1 - x)
  const x = (1 - landmark.x) * rect.width;
  const y = landmark.y * rect.height;

  const bubbles = document.querySelectorAll('.bubble-item');
  bubbles.forEach(b => {
    const bx = b.offsetLeft + b.offsetWidth/2;
    const by = b.offsetTop + b.offsetHeight/2;
    const dist = Math.hypot(x - bx, y - by);

    if (dist < 50 && b.dataset.alive === 'true') {
      popBubble(b);
    }
  });
}

function popBubble(b) {
  b.dataset.alive = 'false';
  b.classList.add('pop-bubble');
  score += 10;
  document.getElementById('bubble-score').innerText = score;
  setTimeout(() => {
    b.remove();
    createSingleBubble();
  }, 400);
}

function createSingleBubble() {
  const container = document.getElementById('bubbles-container');
  const b = document.createElement('div');
  b.className = 'bubble-item absolute float-bubble w-16 h-16 rounded-full';
  b.style.left = Math.random() * 85 + '%';
  b.style.top = Math.random() * 80 + '%';
  b.style.background = 'radial-gradient(circle at 30% 30%, white, rgba(100,200,255,0.6))';
  b.style.border = '2px solid rgba(255,255,255,0.8)';
  b.dataset.alive = 'true';
  container.appendChild(b);
}

function startGame() {
  score = 0;
  timeLeft = 30;
  gameActive = true;
  document.getElementById('bubble-score').innerText = score;
  
  const container = document.getElementById('bubbles-container');
  container.innerHTML = '';
  for(let i=0; i<8; i++) createSingleBubble();

  const timer = setInterval(() => {
    timeLeft--;
    document.getElementById('bubble-timer').innerText = timeLeft;
    if(timeLeft <= 0) {
      clearInterval(timer);
      gameActive = false;
      switchScreen('success');
    }
  }, 1000);
}

function handleSitSuccess() {
  const alert = document.getElementById('sit-alert');
  if (alert.style.display === 'block') {
    alert.style.display = 'none';
    score += 50; // 앉기 성공 점수
  }
}

function switchScreen(screen) {
  document.getElementById('screen-bubble').classList.add('hidden');
  document.getElementById('screen-running').classList.add('hidden');
  document.getElementById('screen-success').classList.add('hidden');
  
  const target = document.getElementById('screen-' + screen);
  target.classList.remove('hidden');
  target.classList.add('flex');

  if (screen === 'running') {
    // 달리기 모드에서는 다른 비디오 엘리먼트에 카메라 연결 유도
    runningVideo.srcObject = videoElement.srcObject;
    setTimeout(() => {
        document.getElementById('sit-alert').style.display = 'block';
    }, 2000);
  }
}
</script>
</body>
</html>
